name: Trump Monitor

on:
  schedule:
    - cron: "0 */5 * * *"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: trump-monitor
  cancel-in-progress: false

jobs:
  monitor:
    name: Trump Monitor
    runs-on: ubuntu-latest
    timeout-minutes: 290

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Build config.json from GitHub secrets
        env:
          ALPACA_API_KEY: ${{ secrets.ALPACA_API_KEY }}
          ALPACA_API_SECRET: ${{ secrets.ALPACA_API_SECRET }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          python - <<'PY'
          import json
          import os
          from pathlib import Path

          config = {
              "alpaca_api_key": os.environ.get("ALPACA_API_KEY", ""),
              "alpaca_api_secret": os.environ.get("ALPACA_API_SECRET", ""),
              "gemini_api_key": os.environ.get("GEMINI_API_KEY", ""),
          }

          Path("config.json").write_text(json.dumps(config, indent=2))
          print("config.json created with secrets:", ", ".join(config.keys()))
          PY

      - name: Run monitor
        env:
          ALPACA_API_KEY: ${{ secrets.ALPACA_API_KEY }}
          ALPACA_API_SECRET: ${{ secrets.ALPACA_API_SECRET }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          CI_MODE: "true"
        run: |
          timeout 17100 python trump_monitor.py || true

      - name: Collect artifacts
        if: always()
        run: |
          mkdir -p artifacts
          for file in trump_bot.log trump_trades.json trump_seen_posts.json; do
            [ -f "$file" ] && cp "$file" artifacts/ || true
          done

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: trump-monitor-${{ github.run_number }}
          path: artifacts/
          if-no-files-found: ignore
          retention-days: 7